<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Saver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- Welcome Section -->
    <div id="welcome-section">
      <h1>Password Saver</h1>
      <div class="welcome-buttons">
        <button onclick="showAddForm()" class="add-btn">Add Password</button>
        <button onclick="showList()" class="add-btn">Show Passwords</button>
      </div>
    </div>

    <!-- Form Section -->
    <div id="form-section" class="hidden">
      <h2>Add New Password</h2>
      <form id="passwordForm">
        <input type="text" id="website" placeholder="Website" required />
        <input type="text" id="username" placeholder="Username/Email" required />
        <div class="password-input">
          <input type="password" id="password" placeholder="Password" required />
          <button type="button" id="togglePassword" onclick="togglePassword()"></button>
        </div>
        <button type="submit" class="add-btn">Save Password</button>
      </form>
      <button onclick="goBack()" class="back-btn">← Back</button>
    </div>

    <!-- Password List Section -->
    <div id="list-section" class="hidden">
      <h2>Saved Passwords</h2>
      <div id="passwordList" class="list-container"></div>
      <button onclick="goBack()" class="back-btn">← Back</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
